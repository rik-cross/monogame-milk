  assemblies:
  - milk
  namespace: milk.Systems
  summary: >-
    Finds an entities closest overlapping entity, and adds it

    to their inventory.

    Note that both entities must have a TriggerComponents, and

    these components must be intersecting.
  example: []
  syntax:
    content: public void CollectNearestEntity(Scene scene, Entity entity)
    parameters:
    - id: scene
      type: milk.Core.Scene
      description: The scene to check.
    - id: entity
      type: milk.Core.Entity
      description: The entity requesting to pick up another entity.
    content.vb: Public Sub CollectNearestEntity(scene As Scene, entity As Entity)
  overload: milk.Systems.CollectionSystem.CollectNearestEntity*
